# ── Multi-Restore Potions ─────────────────────────────────────────

- id: elixir
  name: Elixir
  description: Restores 50 HP, 30 Mana, and 30 Stamina to one ally.
  category: consumable
  item_type: healing
  target_type: ally
  effects:
    - type: restore
      stat: hp
      max_stat: max_hp
      amount: 50
    - type: restore
      stat: mana
      max_stat: max_mana
      amount: 30
    - type: restore
      stat: stamina
      max_stat: max_stamina
      amount: 30

- id: mega_elixir
  name: Mega Elixir
  description: Fully restores HP, Mana, and Stamina of one ally.
  category: consumable
  item_type: healing
  target_type: ally
  effects:
    - type: restore
      stat: hp
      max_stat: max_hp
      amount: 9999
    - type: restore
      stat: mana
      max_stat: max_mana
      amount: 9999
    - type: restore
      stat: stamina
      max_stat: max_stamina
      amount: 9999

- id: team_elixir
  name: Team Elixir
  description: Restores 30 HP, 15 Mana, and 15 Stamina to all allies.
  category: consumable
  item_type: healing
  target_type: all_allies
  effects:
    - type: restore
      stat: hp
      max_stat: max_hp
      amount: 30
    - type: restore
      stat: mana
      max_stat: max_mana
      amount: 15
    - type: restore
      stat: stamina
      max_stat: max_stamina
      amount: 15
