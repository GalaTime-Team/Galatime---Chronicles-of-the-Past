# ── HP Potions ────────────────────────────────────────────────────

- id: hp_potion
  name: HP Potion
  description: Restores 30 HP to one ally.
  category: consumable
  item_type: healing
  target_type: ally          # self | ally | enemy | all_allies | all_enemies
  effect:
    type: restore
    stat: hp
    max_stat: max_hp
    amount: 30

- id: hp_potion_plus
  name: HP Potion+
  description: Restores 75 HP to one ally.
  category: consumable
  item_type: healing
  target_type: ally
  effect:
    type: restore
    stat: hp
    max_stat: max_hp
    amount: 75

- id: mega_hp_potion
  name: Mega HP Potion
  description: Restores 200 HP to one ally.
  category: consumable
  item_type: healing
  target_type: ally
  effect:
    type: restore
    stat: hp
    max_stat: max_hp
    amount: 200

- id: team_hp_potion
  name: Team HP Potion
  description: Restores 40 HP to all allies.
  category: consumable
  item_type: healing
  target_type: all_allies
  effect:
    type: restore
    stat: hp
    max_stat: max_hp
    amount: 40

