- id: hex_bag
  name: Hex Bag
  description: Reduces one enemy's attack and defense by 3 for 3 turns.
  category: consumable
  item_type: debuff
  target_type: enemy
  effect:
    type: status
    status_effect: Hexed
    effect_id: item_hexed
    turns: 3
    debuff:
      physical_attack: 3
      magical_attack: 3
      physical_defense: 3
      magical_defense: 3

- id: curse_scroll
  name: Curse Scroll
  description: Reduces all stats of one enemy by 2 for 4 turns.
  category: consumable
  item_type: debuff
  target_type: enemy
