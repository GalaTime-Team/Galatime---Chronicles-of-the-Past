# ── Single-stat debuffs ───────────────────────────────────────────

- id: weakness_powder
  name: Weakness Powder
  description: Reduces one enemy's physical attack by 5 for 3 turns.
  category: consumable
  item_type: debuff
  target_type: enemy
  effect:
    type: status
    status_effect: Weakened
    effect_id: item_weakened
    turns: 3
    debuff:
      physical_attack: 5

