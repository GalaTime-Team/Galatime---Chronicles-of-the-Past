id: corrupted_soul
name: Corrupted Soul
rarity: epic
height: "140 cm"
weight: "0 kg"
description: >
  A soul consumed by endless avarice. Its touch withers resolve, and
  its hunger feeds on any fading spark nearby.

age: null
birthday: null
origin: Atlaria
starting_relationships:
  liking: 0
  trust: 0


ai:
  personality: aggressive
  conditions:
    - condition: default
      action: strongest_attack
      priority: 80

elements:
  - umbra

base_stats:
  hp: 500
  max_hp: 500
  mana: 85
  max_mana: 85
  stamina: 30
  max_stamina: 30
  physical_attack: 28
  magical_attack: 72
  physical_defense: 46
  magical_defense: 38
  speed: 47

skills:
  - id: abyssal_drain
    name: Abyssal Drain
    element: umbra
    damage_type: magical
    target: individual
    power: 46
    stamina_cost: 10
    effects:
      - effect_id: abyssal_drain_heal
        status_effect: Abyssal Drain
        apply_to: self
        resource_regen:
          hp: 24
          mana: 6
        regen_variance: [0.4, 1.2]

  - id: corruptive_wail
    name: Corruptive Wail
    element: umbra
    damage_type: magical
    target: all
    power: 30
    mana_cost: 15
    effects:
      - effect_id: corruptive_wail
        status_effect: Corruptive Wail
        apply_to: enemies_all
        turns: 2
        debuff:
          physical_attack: 10
          magical_attack: 10
        apply_chance: 0.4

  - id: desolate_claw
    name: Desolate Claw
    element: umbra
    damage_type: physical
    target: individual
    power: 40
    stamina_cost: 12
    hits: 2
    hit_chance: 0.9

loot:
  - item_id: gold_coin
    quantity: 3
    chance: 0.65

abilities:
  - ability_name: Nether Armor
    condition:
      type: on_low_resource
      resource: hp
      threshold: 0.4
    action:
      type: immunity
      damage_type: magical
      duration: 2
    keep_triggered_after_once: false
    activation_message: "A nether veil shields the Corrupted Soul from magic!"

  - ability_name: Twisted Reflection
    condition:
      type: on_turn
      interval: 3
      timing: post_action
      require_battle_continues: true
    action:
      type: change_state
      new_template: pure_soul
    keep_triggered_after_once: false
    activation_message: "The Corrupted Soul's corruption shifts, briefly revealing purity."

